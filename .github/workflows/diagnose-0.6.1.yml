name: Diagnose RiderApp 0.6.1

on:
  pull_request:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Capture unit test and APK build output
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          gradle testDebugUnitTest assembleDebug --stacktrace 2>&1 | tee build-output.log

      - name: Upload diagnostic output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: riderapp-0.6.1-build-output
          path: build-output.log

      - name: Fail when Gradle failed
        if: steps.build.outcome == 'failure'
        run: exit 1
