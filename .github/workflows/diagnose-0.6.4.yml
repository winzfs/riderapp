name: Diagnose 0.6.4

on:
  push:
    branches:
      - agent/validate-riderapp-0.6.4
  pull_request:
    branches:
      - main

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Build and print concise diagnostics
        id: build
        shell: bash
        run: |
          set +e
          gradle testDebugUnitTest assembleDebug --stacktrace > build-output.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            echo "===== COMPILE / FAILURE LINES ====="
            grep -nE '(^e: | error: |FAILURE:|What went wrong|Compilation error|Unresolved reference|Type mismatch)' build-output.log | tail -n 160 || true
            echo "===== LOG TAIL ====="
            tail -n 120 build-output.log
          else
            echo "Gradle build succeeded."
          fi
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: riderapp-0.6.4-build-log
          path: build-output.log
      - name: Fail when Gradle failed
        if: steps.build.outputs.status != '0'
        run: exit 1
