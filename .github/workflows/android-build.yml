name: Build APK

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test and build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Run unit tests and build APK
        run: gradle --no-daemon --stacktrace :app:testDebugUnitTest :app:assembleDebug

      - name: Prepare downloadable APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/riderapp-debug.apk
          cd dist
          sha256sum riderapp-debug.apk > riderapp-debug.apk.sha256

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: riderapp-debug-apk
          path: |
            dist/riderapp-debug.apk
            dist/riderapp-debug.apk.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Upload test report when failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: riderapp-test-report
          path: app/build/reports/tests/
          if-no-files-found: ignore
          retention-days: 7
